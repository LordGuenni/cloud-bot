<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>THB Azure Registration Bot</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>THB Azure Registration Bot</h1>
      <div id="chat" class="chat"></div>
      <form id="chat-form" class="composer">
        <input id="message" type="text" autocomplete="off" placeholder="Type your message..." />
        <button type="submit">Send</button>
        <button id="voice-btn" type="button">🎤 Voice</button>
      </form>
      <p class="hint">
        Voice input/output uses Azure Speech Services. Commands: <code>restart</code>,
        <code>yes</code>/<code>no</code>.
      </p>
    </main>
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
