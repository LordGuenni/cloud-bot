name: Infrastructure and Bot Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep Infrastructure
        uses: azure/bicep-deploy@v2
        id: deploy
        with:
          type: deployment
          operation: create
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template-file: ./infra/main.bicep
          parameters: |
            botName: stamer-registration-bot
            location: germanywestcentral
            microsoftAppId: ${{ secrets.MICROSOFT_APP_ID }}
            microsoftAppPassword: ${{ secrets.MICROSOFT_APP_PASSWORD }}

    outputs:
      webAppName: ${{ steps.deploy.outputs.webAppName }}
      keyVaultName: ${{ steps.deploy.outputs.keyVaultName }}

  build:
    runs-on: ubuntu-latest
    needs: infrastructure
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Zip artifact
        run: zip release.zip ./* -r --exclude ".git/*" --exclude "venv/*" --exclude "azure-cli-env/*" --exclude "infra/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: [infrastructure, build]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: python-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.infrastructure.outputs.webAppName }}
          package: release.zip
